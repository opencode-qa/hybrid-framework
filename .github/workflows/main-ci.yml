name: "🚀 Main CI Pipeline"

on:
  pull_request:
    branches: [main, dev]  # Added dev branch
  push:
    branches: [main, dev]  # Added dev branch

jobs:
  validate-pom:
    name: "📦 Validate POM"  # Exact name for branch protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          chmod +x ./scripts/pom-validator.sh

      - name: Validate POM
        run: |
          xmllint --noout pom.xml || (echo "::error::Malformed XML in pom.xml"; exit 1)
          ./scripts/pom-validator.sh --strict --html

      - uses: actions/upload-artifact@v4
        name: 📦 Upload POM Report
        with:
          name: pom-validation-report
          path: Reports/pom-validation-report.html

  build:
    name: "🏗️ Build & Test"
    needs: validate-pom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: mvn -B clean verify
      - uses: actions/upload-artifact@v4
        name: 📊 Upload Test Results
        with:
          name: test-results-${{ github.run_id }}
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**

  security:
    name: "🔒 Dependency Security"
    needs: validate-pom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: mvn org.owasp:dependency-check-maven:check

  quality:
    name: "📊 Code Quality"
    needs: validate-pom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: mvn checkstyle:check
