name: "🚀 Release Automation"

on:
  push:
    branches: [main]
    tags-ignore: ['*']
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Determine version
        id: version
        run: |
          # First release detection
          if [ -z "$(git tag -l)" ]; then
            echo "release_version=0.0.0" >> $GITHUB_OUTPUT
            echo "release_tag=v0.0.0" >> $GITHUB_OUTPUT
            echo "is_initial_release=true" >> $GITHUB_OUTPUT
          else
            # Normal version bump
            LATEST_TAG=$(git describe --tags --abbrev=0)
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            RELEASE_VERSION="${MAJOR}.$((MINOR+1)).0"
            echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
            echo "release_tag=v$RELEASE_VERSION" >> $GITHUB_OUTPUT
            echo "is_initial_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Update POM
        if: steps.version.outputs.is_initial_release != 'true'
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.release_version }}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pom.xml
          git commit -m "chore: release ${{ steps.version.outputs.release_tag }} [skip ci]"
          git push

      - name: Create tag
        run: |
          git tag -a ${{ steps.version.outputs.release_tag }} \
            -m "Release ${{ steps.version.outputs.release_tag }}"
          git push origin ${{ steps.version.outputs.release_tag }}

      - name: Generate changelog
        run: |
          if ${{ steps.version.outputs.is_initial_release }}; then
            CHANGELOG="# Initial Release\n\nFirst version of the project"
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
            CHANGELOG="## Changes since $PREV_TAG\n\n"
            CHANGELOG+=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)")
          fi
          echo -e "$CHANGELOG" > CHANGELOG.md

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Release ${{ steps.version.outputs.release_tag }}
          body_path: CHANGELOG.md
          generate_release_notes: true

      - name: Update issues
        if: steps.version.outputs.is_initial_release != 'true'
        run: |
          # Find issues fixed since last release
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
          CLOSED_ISSUES=$(gh api search/issues \
            -q "repo:${{ github.repository }} is:closed closed:>$(git log -1 --format=%ai $PREV_TAG)" \
            --jq '.items[].number' | tr '\n' ',' | sed 's/,$//')

          # Add release notes to issues
          for ISSUE in ${CLOSED_ISSUES//,/ }; do
            gh issue comment $ISSUE \
              --body "🚀 Released in [${{ steps.version.outputs.release_tag }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.release_tag}})"
          done
