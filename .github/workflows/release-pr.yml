name: "🚀 Release Automation"

on:
  workflow_run:
    workflows: ["Main CI Pipeline", "POM Validation"]
    branches: [main, dev]
    types: [completed]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  release:
    name: "🚀 Release Automation"  # Exact name for branch protection
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'dev')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Get version information
        id: version
        run: |
          # First release detection
          if [ -z "$(git tag -l)" ]; then
            echo "new_version=0.0.0" >> $GITHUB_OUTPUT
            echo "new_tag=v0.0.0" >> $GITHUB_OUTPUT
            echo "is_initial_release=true" >> $GITHUB_OUTPUT
          else
            # Normal version bump
            LATEST_TAG=$(git describe --tags --abbrev=0)
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "is_initial_release=false" >> $GITHUB_OUTPUT
          fi
          echo "Detected version: ${{ steps.version.outputs.new_tag }}"

      - name: Update POM version
        if: steps.version.outputs.is_initial_release != 'true'
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.new_version }}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pom.xml
          git commit -m "chore: version bump → ${{ steps.version.outputs.new_tag }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a ${{ steps.version.outputs.new_tag }} \
            -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Generate changelog
        run: |
          if ${{ steps.version.outputs.is_initial_release }}; then
            echo "# Initial Release" > CHANGELOG.md
            echo "First version of the project" >> CHANGELOG.md
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1)
            echo "# Release ${{ steps.version.outputs.new_tag }}" > CHANGELOG.md
            echo "## Changes since $PREV_TAG" >> CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: "Release ${{ steps.version.outputs.new_tag }}"
          body_path: CHANGELOG.md
          generate_release_notes: true

      - name: Update related issues
        if: steps.version.outputs.is_initial_release != 'true'
        run: |
          # Find recently closed issues
          CLOSED_ISSUES=$(gh api search/issues \
            -q "repo:${{ github.repository }} is:closed closed:>${{ github.event.workflow_run.created_at }}" \
            --jq '.items[].number' | tr '\n' ' ')

          # Add release notification to each issue
          for ISSUE in $CLOSED_ISSUES; do
            echo "Updating issue #$ISSUE"
            gh issue comment $ISSUE \
              --body "🚀 Included in release [${{ steps.version.outputs.new_tag }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.new_tag}})"
          done

      - name: Show results
        run: |
          echo "=== RELEASE COMPLETE ==="
          echo "Version: ${{ steps.version.outputs.new_tag }}"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.new_tag }}"
          if [ -n "$CLOSED_ISSUES" ]; then
            echo "Linked Issues: $CLOSED_ISSUES"
          fi
