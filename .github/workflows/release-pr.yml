name: "🚀 Release Automation"

on:
  push:
    branches: [main]
    tags-ignore: ['*']
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Changed from GH_PAT to built-in token

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Determine version
        id: version
        run: |
          if git describe --tags --abbrev=0 &>/dev/null; then
            LATEST_TAG=$(git describe --tags --abbrev=0)
            VERSION="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            NEW_VERSION="${MAJOR}.$((MINOR+1)).0"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "new_version=0.0.0" >> $GITHUB_OUTPUT
            echo "new_tag=v0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Update POM version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.new_version }}
          git add pom.xml
          git commit -m "chore: bump to ${{ steps.version.outputs.new_tag }}"
          git push

      - name: Create and push tag
        run: |
          git tag -a ${{ steps.version.outputs.new_tag }} -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Generate changelog
        run: |
          if git tag --list | grep -q .; then
            PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --max-count=1 --skip=1))
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi
          echo -e "## Release ${{ steps.version.outputs.new_tag }}\n\n$CHANGELOG" > CHANGELOG.md

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          release_name: Release ${{ steps.version.outputs.new_tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
